apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-bank-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      service: server
  template:
    metadata:
      labels:
        service: server
    spec:
      containers:
        - name: server-service
          image: gavrilukkirilo/spring-boot-bank-api:latest
          imagePullPolicy: Always
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/bankApi
            - name: SPRING_DATASOURCE_USERNAME
              value: bankApi
            - name: SPRING_DATASOURCE_PASSWORD
              value: bankApi
---
apiVersion: v1
kind: Service
metadata:
  name: service-entrypoint
  namespace: default
spec:
  type: NodePort
  selector:
    service: server
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: bankApi
            - name: POSTGRES_USER
              value: bankApi
            - name: POSTGRES_PASSWORD
              value: bankApi
          ports:
            - containerPort: 5432

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gavrilukkirilo/bankapi-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5713
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-entrypoint
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5713
      targetPort: 5713
      nodePort: 30002